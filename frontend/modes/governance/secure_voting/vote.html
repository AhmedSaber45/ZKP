<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Voting | ZKP Vault</title>
    <link rel="stylesheet" href="../../../assets/css/main.css">
    <script src="../../../assets/js/layout.js"></script>
</head>

<body>
    <div id="navbar-container"></div>
    <div id="sidebar-container"></div>

    <div class="content animate-fade-in">
        <div style="margin-bottom: 2rem;">
            <h1 style="color: var(--text-main);">Secure Governance</h1>
            <p>Participate in anonymous, tamper-proof voting protocols</p>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
            <!-- Cast Vote Card -->
            <div class="card">
                <h3 style="margin-bottom: 1.5rem;">Submit Your Vote</h3>
                <p style="margin-bottom: 1rem; color: var(--text-muted);">Select your preferred choice. Your identity
                    remains protected by Zero Knowledge Proofs.</p>

                <div style="display: flex; flex-direction: column; gap: 1rem; margin-top: 2rem;">
                    <label class="glass"
                        style="display: flex; align-items: center; gap: 15px; padding: 15px; border-radius: 12px; cursor: pointer;">
                        <input type="radio" name="choice" value="Option A" style="width: auto;">
                        <div>
                            <p style="color: var(--text-main); font-weight: 600;">Proposal #101: Network Expansion</p>
                            <p style="font-size: 0.75rem;">Support the upgrade of node infrastructure.</p>
                        </div>
                    </label>

                    <label class="glass"
                        style="display: flex; align-items: center; gap: 15px; padding: 15px; border-radius: 12px; cursor: pointer;">
                        <input type="radio" name="choice" value="Option B" style="width: auto;">
                        <div>
                            <p style="color: var(--text-main); font-weight: 600;">Proposal #102: Protocol Adjustment</p>
                            <p style="font-size: 0.75rem;">Modify the verification timeout parameters.</p>
                        </div>
                    </label>

                    <button onclick="castVote()" style="width:100%; margin-top: 1rem;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                            <polyline points="22 4 12 14.01 9 11.01"></polyline>
                        </svg>
                        Submit Secure Ballot
                    </button>
                    <p id="vote-message" style="text-align: center; height: 20px; font-size: 0.85rem;"></p>
                </div>
            </div>

            <!-- Results Card -->
            <div class="card">
                <h3 style="margin-bottom: 1.5rem;">Current Standings</h3>
                <div id="vote-results" style="display: flex; flex-direction: column; gap: 1.5rem; margin-top: 2rem;">
                    <p style="text-align: center; padding: 40px; color: var(--text-muted);">Loading live results...</p>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-container"></div>

    <script src="../../../assets/js/api.js"></script>
    <script>
        async function fetchResults() {
            try {
                const res = await fetch(`${API}/voting/results`);
                const data = await res.json();
                const container = document.getElementById("vote-results");

                if (data.length === 0) {
                    container.innerHTML = '<p style="text-align: center; color: var(--text-muted);">No ballots cast yet.</p>';
                    return;
                }

                const total = data.reduce((acc, curr) => acc + curr.count, 0);

                container.innerHTML = data.map(res => {
                    const pct = ((res.count / total) * 100).toFixed(1);
                    return `
                        <div>
                            <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                                <span style="font-size: 0.85rem; font-weight: 600;">${res.choice}</span>
                                <span style="font-size: 0.85rem; color: var(--primary);">${pct}%</span>
                            </div>
                            <div style="height: 10px; background: rgba(255,255,255,0.05); border-radius: 5px; overflow: hidden;">
                                <div style="width: ${pct}%; height: 100%; background: var(--primary); box-shadow: 0 0 10px var(--primary);"></div>
                            </div>
                            <p style="font-size: 0.7rem; color: var(--text-muted); margin-top: 4px;">${res.count} verified ballots</p>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                console.error(err);
            }
        }

        async function castVote() {
            const selected = document.querySelector('input[name="choice"]:checked');
            const msg = document.getElementById("vote-message");
            const voter_id = localStorage.getItem("user") || "anonymous_" + Math.random().toString(36).substr(2, 5);

            if (!selected) {
                msg.innerText = "Please select an option first";
                msg.style.color = "#ef4444";
                return;
            }

            try {
                const res = await fetch(`${API}/voting/vote`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ voter_id, choice: selected.value })
                });

                if (res.ok) {
                    msg.innerText = "Vote successfully encrypted and cast!";
                    msg.style.color = "#22c55e";
                    fetchResults();
                } else {
                    msg.innerText = "Voting error. Please try again.";
                    msg.style.color = "#ef4444";
                }
            } catch (err) {
                msg.innerText = "Network Error";
            }
        }

        window.addEventListener('load', fetchResults);
    </script>
</body>

</html>
