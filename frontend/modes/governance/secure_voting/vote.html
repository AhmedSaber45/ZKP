<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Voting | ZKP Vault</title>
    <link rel="stylesheet" href="../../../assets/css/main.css">
    <script src="../../../assets/js/layout.js"></script>
</head>

<body>
    <div id="navbar-container"></div>
    <div id="sidebar-container"></div>

    <div class="content animate-fade-in">
        <div style="margin-bottom: 2rem;">
            <h1 style="color: var(--text-main);">Secure Governance</h1>
            <p>Participate in anonymous, tamper-proof voting protocols</p>
        </div>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 2rem;">
            <!-- Cast Vote Card -->
            <div class="card">
                <h3 style="margin-bottom: 1.5rem;">Submit Your Vote</h3>
                <p style="margin-bottom: 1rem; color: var(--text-muted);">Select your preferred choice. Your identity
                    remains protected by Zero Knowledge Proofs.</p>

                <div style="display: flex; flex-direction: column; gap: 1rem; margin-top: 1rem;">
                    <!-- Voter Info -->
                    <div style="display: flex; gap: 1rem;">
                        <input id="voter-id-input" type="text" placeholder="Voter ID" class="glass" 
                            style="flex: 2; padding: 12px; border-radius: 8px; font-size: 0.85rem;" />
                        <input id="voter-secret-input" type="password" placeholder="Key (1-21)" class="glass" 
                            style="flex: 1; padding: 12px; border-radius: 8px; font-size: 0.85rem;" />
                    </div>

                    <label class="glass"
                        style="display: flex; align-items: center; gap: 15px; padding: 15px; border-radius: 12px; cursor: pointer;">
                        <input type="radio" name="choice" value="Candidate #101" style="width: auto;">
                        <div>
                            <p style="color: var(--text-main); font-weight: 600;">Candidate #101: Network Expansion</p>
                            <p style="font-size: 0.75rem;">Support the upgrade of node infrastructure.</p>
                        </div>
                    </label>

                    <label class="glass"
                        style="display: flex; align-items: center; gap: 15px; padding: 15px; border-radius: 12px; cursor: pointer;">
                        <input type="radio" name="choice" value="Candidate #102" style="width: auto;">
                        <div>
                            <p style="color: var(--text-main); font-weight: 600;">Candidate #102: Protocol Adjustment</p>
                            <p style="font-size: 0.75rem;">Modify the verification timeout parameters.</p>
                        </div>
                    </label>

                    <button id="vote-btn" onclick="castSecureVote()" style="width:100%; margin-top: 1rem;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                            <polyline points="22 4 12 14.01 9 11.01"></polyline>
                        </svg>
                        Submit Secure Ballot
                    </button>
                    <p id="vote-message" style="text-align: center; height: 20px; font-size: 0.85rem; font-weight: 500;"></p>
                </div>
            </div>

        </div>
    </div>

    <div id="footer-container"></div>

    <script src="../../../assets/js/api.js"></script>
    <script src="voting.js"></script>
    <script>
        // Use pre-populated user from localStorage if possible
        const user = localStorage.getItem("user") || "zkp_voter_" + Math.random().toString(36).substr(2, 4);
        const voterIdInput = document.getElementById("voter-id-input");
        if (voterIdInput) voterIdInput.value = user;

        async function fetchResults() {
            try {
                const res = await fetch(`${API}/voting/results`);
                const json = await res.json();
                const container = document.getElementById("vote-results");

                if (json.status !== "success") {
                    container.innerHTML = `<p style="text-align: center; color: var(--text-muted);">${json.message || "Error loading results."}</p>`;
                    return;
                }

                const data = json.data; // Now a dict { "choice": count }
                const entries = Object.entries(data);

                if (entries.length === 0) {
                    container.innerHTML = '<p style="text-align: center; color: var(--text-muted); padding: 20px;">No verified ballots yet.</p>';
                    return;
                }

                const total = entries.reduce((acc, [_, count]) => acc + count, 0);

                container.innerHTML = entries.map(([choice, count]) => {
                    const pct = total > 0 ? ((count / total) * 100).toFixed(1) : 0;
                    return `
                        <div>
                            <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                                <span style="font-size: 0.85rem; font-weight: 600;">${choice}</span>
                                <span style="font-size: 0.85rem; color: var(--primary);">${pct}%</span>
                            </div>
                            <div style="height: 10px; background: rgba(255,255,255,0.05); border-radius: 5px; overflow: hidden;">
                                <div style="width: ${pct}%; height: 100%; background: var(--primary); box-shadow: 0 0 10px var(--primary); transition: width 0.3s ease-out;"></div>
                            </div>
                            <p style="font-size: 0.7rem; color: var(--text-muted); margin-top: 4px;">${count} verified ballots</p>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                console.error(err);
            }
        }
        window.addEventListener('load', fetchResults);
    </script>
</body>

</html>
