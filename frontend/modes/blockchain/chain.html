<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chain Explorer | ZKP Vault</title>
    <link rel="stylesheet" href="../../assets/css/main.css?v=2">
    <script src="../../assets/js/layout.js?v=2"></script>
    <style>
        .explorer-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 20px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .stat-icon {
            width: 44px;
            height: 44px;
            background: rgba(59, 130, 246, 0.1);
            color: var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .stat-info {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 700;
        }

        .stat-value {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .notification-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .notification-item {
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            font-size: 0.85rem;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .notification-time {
            font-family: 'Fira Code', monospace;
            font-size: 0.7rem;
            color: var(--text-muted);
            white-space: nowrap;
        }
    </style>
</head>

<body>
    <div id="navbar-container"></div>
    <div id="sidebar-container"></div>

    <div class="content animate-fade-in">
        <div class="page-header">
            <div>
                <h1 style="font-size: 2rem; margin-bottom: 0.5rem;">Chain <span style="color: var(--primary);">Explorer</span></h1>
                <p style="color: var(--text-muted);">Inspect confirmed transactions and block metadata history.</p>
            </div>
            <div class="header-status">
                <button onclick="validateChain()" class="glass-btn" style="background: rgba(34, 197, 94, 0.1); color: #22c55e; border: 1px solid rgba(34, 197, 94, 0.2);">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 11.08 20 9 13 16 9 12 7 14 13 20 22 11.08"></polyline><path d="M12 22a10 10 0 0 1-10-10 10 10 0 0 1 10-10"></path></svg>
                    Verify Integrity
                </button>
            </div>
        </div>

        <div class="explorer-stats">
            <div class="stat-card">
                <div class="stat-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4a2 2 0 0 0 1-1.73z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                </div>
                <div class="stat-info">
                    <span class="stat-label">Chain Length</span>
                    <span id="chainLength" class="stat-value">0</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="color: var(--accent); background: rgba(6, 182, 212, 0.1);">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                </div>
                <div class="stat-info">
                    <span class="stat-label">Confirmed TXs</span>
                    <span id="txCount" class="stat-value">0</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="color: #22c55e; background: rgba(34, 197, 94, 0.1);">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                </div>
                <div class="stat-info">
                    <span class="stat-label">Latest Hash</span>
                    <span id="latestHash" class="stat-value" style="font-size: 0.9rem; opacity: 0.7;">-</span>
                </div>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 2rem;">
            <div class="card">
                <div class="modal-header" style="margin-bottom: 1.5rem;">
                    <h3 class="modal-title">Global Ledger</h3>
                </div>
                <div class="table-container" id="chainTableContainer">
                    <p style="padding: 20px; color: var(--text-muted);">Syncing with blockchain network...</p>
                </div>
            </div>

            <div class="card">
                <div class="modal-header" style="margin-bottom: 1.5rem;">
                    <h3 class="modal-title">Network Activity</h3>
                </div>
                <div id="notificationsList" class="notification-list">
                    <p style="color: var(--text-muted); font-size: 0.85rem;">Listening for block events...</p>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-container"></div>

    <script src="../../assets/js/api.js?v=20260409a"></script>
    <script src="../../assets/js/blockchain.js?v=20260413c"></script>
</body>

</html>
