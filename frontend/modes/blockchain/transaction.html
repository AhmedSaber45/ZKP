<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockchain Ledger | ZKP Vault</title>
    <link rel="stylesheet" href="../../assets/css/main.css">
    <script src="../../assets/js/layout.js"></script>
</head>

<body>
    <div id="navbar-container"></div>
    <div id="sidebar-container"></div>

    <div class="content animate-fade-in">
        <div style="margin-bottom: 2rem;">
            <h1 style="color: var(--text-main);">Blockchain Ledger</h1>
            <p>Securely record and view immutable transactions</p>
        </div>

        <div style="display: grid; grid-template-columns: 350px 1fr; gap: 2rem; align-items: start;">
            <!-- Send Transaction Card -->
            <div class="card">
                <h3 style="margin-bottom: 1.5rem;">New Transaction</h3>
                <div style="display: flex; flex-direction: column; gap: 1rem;">
                    <div>
                        <label
                            style="display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.5rem;">RECEIVER</label>
                        <input id="receiver" type="text" placeholder="Wallet Address / Username" style="width:100%;">
                    </div>
                    <div>
                        <label
                            style="display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.5rem;">AMOUNT
                            (ZKP)</label>
                        <input id="amount" type="number" placeholder="0.00" style="width:100%;">
                    </div>
                    <button onclick="sendTransaction()" style="width:100%; margin-top: 1rem;">
                        Broadcast to Chain
                    </button>
                    <p id="tx-message" style="font-size: 0.8rem; text-align: center; height: 20px;"></p>
                </div>
            </div>

            <!-- History Card -->
            <div class="card">
                <h3 style="margin-bottom: 1.5rem;">Transaction History</h3>
                <div id="tx-history"
                    style="display: flex; flex-direction: column; gap: 0.5rem; max-height: 500px; overflow-y: auto; padding-right: 10px;">
                    <p style="text-align: center; padding: 40px; color: var(--text-muted);">Loading transactions...</p>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-container"></div>

    <script src="../../assets/js/api.js"></script>
    <script>
        async function fetchHistory() {
            try {
                const res = await fetch(`${API}/blockchain/history`);
                const data = await res.json();
                const container = document.getElementById("tx-history");

                if (data.length === 0) {
                    container.innerHTML = '<p style="text-align: center; padding: 40px; color: var(--text-muted);">No transactions found</p>';
                    return;
                }

                container.innerHTML = data.map(tx => `
                    <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border); border-radius: 8px;">
                        <div>
                            <p style="font-size: 0.85rem; color: var(--text-main); font-weight: 600;">${tx.sender} &rarr; ${tx.receiver}</p>
                            <p style="font-size: 0.75rem; color: var(--text-muted);">${new Date(tx.timestamp).toLocaleString()}</p>
                        </div>
                        <div style="text-align: right;">
                            <p style="font-size: 0.9rem; font-weight: 700; color: var(--primary);">${tx.amount} ZKP</p>
                            <p style="font-size: 0.65rem; color: #22c55e;">CONFIRMED</p>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error("History fetch error:", err);
            }
        }

        async function sendTransaction() {
            const rxVal = document.getElementById("receiver").value;
            const amtVal = document.getElementById("amount").value;
            const msg = document.getElementById("tx-message");
            const sender = localStorage.getItem("user") || "Anonymous";

            if (!rxVal || !amtVal) {
                msg.innerText = "Please fill all fields";
                msg.style.color = "#ef4444";
                return;
            }

            try {
                const res = await fetch(`${API}/blockchain/transaction`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ sender, receiver: rxVal, amount: amtVal })
                });

                if (res.ok) {
                    msg.innerText = "Success! Block mined.";
                    msg.style.color = "#22c55e";
                    fetchHistory();
                } else {
                    msg.innerText = "Broadcast failed";
                    msg.style.color = "#ef4444";
                }
            } catch (err) {
                msg.innerText = "Network Error";
                msg.style.color = "#ef4444";
            }
        }

        window.addEventListener('load', fetchHistory);
    </script>
</body>

</html>
