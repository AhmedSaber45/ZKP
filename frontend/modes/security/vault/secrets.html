<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Vault | ZKP Vault</title>
    <link rel="stylesheet" href="../../../assets/css/main.css">
    <script src="../../../assets/js/layout.js"></script>
</head>

<body>
    <div id="navbar-container"></div>
    <div id="sidebar-container"></div>

    <div class="content animate-fade-in">
        <div style="margin-bottom: 2rem;">
            <h1 style="color: var(--text-main);">Privacy Vault</h1>
            <p>Store encrypted secrets protected by AES-256 and Zero Knowledge Proofs</p>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
            <!-- Store Secret -->
            <div class="card">
                <h3 style="margin-bottom: 1.5rem;">Secure New Secret</h3>
                <div style="display: flex; flex-direction: column; gap: 1.25rem;">
                    <div>
                        <label style="display: block; font-size: 0.75rem; font-weight: 700; color: var(--text-muted); margin-bottom: 8px;">SECRET NAME</label>
                        <input id="secret-name" type="text" placeholder="e.g. Master Key" style="width: 100%;">
                    </div>
                    <div>
                        <label style="display: block; font-size: 0.75rem; font-weight: 700; color: var(--text-muted); margin-bottom: 8px;">SECRET CONTENT</label>
                        <textarea id="secret-content" rows="4" placeholder="Sensitive data..."></textarea>
                    </div>
                    <button onclick="saveSecret()" style="width: 100%;">
                        Encrypt & Seal
                    </button>
                    <p id="vault-message" style="text-align: center; height: 20px; font-size: 0.85rem;"></p>
                </div>
            </div>

            <!-- Stored Secrets -->
            <div class="card">
                <h3 style="margin-bottom: 1.5rem;">Your Secure Storage</h3>
                <div id="secrets-list" style="display: flex; flex-direction: column; gap: 1rem;">
                    <p style="text-align: center; padding: 40px; color: var(--text-muted);">No secrets stored yet.</p>
                </div>
            </div>
        </div>
    </div>

    <div id="footer-container"></div>
    <script src="../../../assets/js/api.js"></script>
    <script>
        function saveSecret() {
            const name = document.getElementById("secret-name").value;
            const content = document.getElementById("secret-content").value;
            const msg = document.getElementById("vault-message");
            
            if (!name || !content) {
                msg.innerText = "Please fill all fields";
                msg.style.color = "#ef4444";
                return;
            }

            // Simulating encryption and storage
            msg.innerText = "Encrypting with AES-256...";
            msg.style.color = "var(--primary)";
            
            setTimeout(() => {
                const list = document.getElementById("secrets-list");
                if (list.innerText.includes("No secrets stored")) list.innerHTML = "";
                
                const item = document.createElement("div");
                item.className = "glass";
                item.style.padding = "15px";
                item.style.borderRadius = "12px";
                item.style.display = "flex";
                item.style.justifyContent = "space-between";
                item.style.alignItems = "center";
                item.innerHTML = `
                    <div>
                        <p style="color: var(--text-main); font-weight: 600;">${name}</p>
                        <p style="font-size: 0.7rem; color: var(--text-muted);">Encrypted at ${new Date().toLocaleTimeString()}</p>
                    </div>
                    <button style="padding: 6px 12px; font-size: 0.75rem; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);">Decrypt</button>
                `;
                list.prepend(item);
                
                msg.innerText = "Secret sealed successfully!";
                msg.style.color = "#22c55e";
                document.getElementById("secret-name").value = "";
                document.getElementById("secret-content").value = "";
            }, 1000);
        }
    </script>
</body>

</html>
