<!DOCTYPE html>

<html>

<head>

<link rel="stylesheet" href="../../../assets/css/styles.css">

<script src="../../../assets/js/api.js"></script>
<script src="../../../assets/js/signature.js"></script>

</head>

<body>

<div class="container">

<h2>Sign Message</h2>

<textarea
id="message"
placeholder="Enter message"
></textarea>

<button onclick="signMessage()">

Sign Message

</button>

<p
id="status"
class="status"
></p>

<a href="verify.html">Go to Verify Page →</a>
</div>

<script>

async function signMessage(){

const message =
document.getElementById("message").value;

const signature =
await apiRequest(
"/signature/sign",
"POST",
{
message,
private_key:
localStorage.private_key
}
);

document.getElementById(
"status"
).innerHTML =
"Signature Generated Successfully ✅<br><br>" +
"<strong>Signature (click to copy):</strong><br>" +
"<code id='signatureOutput' style='background: #f0f0f0; padding: 10px; display: block; word-break: break-all; cursor: pointer;'>" +
signature.signature +
"</code>";

// Allow clicking signature to copy
document.getElementById("signatureOutput").onclick = function() {
navigator.clipboard.writeText(signature.signature);
alert("Signature copied to clipboard!");
};

}

</script>

</body>

</html>
