<!DOCTYPE html>

<html>

<head>

<link rel="stylesheet" href="../../../assets/css/styles.css">

<script src="../../../assets/js/api.js" ></script>
<script src="../../../assets/js/identity.js" ></script>

</head>

<body>

<div class="container">

<h2>Register Digital Identity</h2>

<input
id="identity"
placeholder="Enter identity"
/>

<button onclick="registerIdentity()">

Register Identity

</button>

<p
id="status"
class="status"
></p>
<a href="../digital_signature/sign.html">Go to Sign Page →</a>
</div>

<script>

async function registerIdentity() {

    const identity = document.getElementById("identity").value;

    const result = await apiRequest(
        "/identity/register", // ✅ fixed endpoint
        "POST",
        { email: identity }   // ⚠ backend expects field "email"
    );

    // store keys locally
    localStorage.setItem("private_key", result.private_key);
    localStorage.setItem("public_key", result.public_key);

    document.getElementById("status").innerHTML =
        "Identity Registered Successfully ✅";
}

</script>

</body>

</html>
