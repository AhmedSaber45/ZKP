<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZKP Secure Login</title>
  <link rel="stylesheet" href="assets/css/main.css">
  <script src="assets/js/layout.js"></script>
</head>

<body>
  <div id="navbar-container"></div>

  <div style="display:flex; justify-content:center; align-items:center; min-height:100vh; padding: 20px;">
    <div class="card animate-fade-in" style="width:100%; max-width:400px; text-align: center;">
      <div style="margin-bottom: 2rem;">
        <div class="logo" style="justify-content: center; font-size: 1.5rem; margin-bottom: 0.5rem;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary)">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
          </svg>
          ZKP Secure
        </div>
        <p>Enter your credentials to access the vault</p>
      </div>

      <div style="display: flex; flex-direction: column; gap: 1rem; text-align: left;">
        <div>
          <label
            style="display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.5rem;">USERNAME</label>
          <input id="username" type="text" placeholder="e.g. admin_01" style="width:100%;">
        </div>

        <div style="margin-bottom: 0.5rem;">
          <label
            style="display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.5rem;">SECRET
            KEY</label>
          <input id="secret" type="password" placeholder="••••••••" style="width:100%;">
        </div>

        <button onclick="login()" style="width:100%; margin-top: 0.5rem;">
          Sign In
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </button>
      </div>

      <p id="message" style="margin-top: 1.5rem; font-size: 0.85rem; height: 20px;"></p>

      <div style="margin-top: 2rem; border-top: 1px solid var(--glass-border); padding-top: 1.5rem;">
        <p style="font-size: 0.75rem;">Protected by Zero Knowledge Proofs & AES-256</p>
      </div>
    </div>
  </div>

  <div id="footer-container"></div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
</body>

</html>
